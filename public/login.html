<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>შესვლა – Region Battle</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b10;--bg2:#13131c;--bg3:#1a1a26;
  --border:rgba(255,255,255,0.07);
  --text:#eeeef5;--muted:#6b6b85;
  --accent:#4f8ef7;--red:#f87171;--r:12px;--rs:8px;
}
html,body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;display:flex;align-items:center;
  justify-content:center;padding:16px;
}
.box{
  width:100%;max-width:360px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:28px 24px;
}
.logo{text-align:center;margin-bottom:24px}
.logo h1{font-size:22px;font-weight:800}
.logo p{font-size:12px;color:var(--muted);margin-top:4px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text);font-size:15px;
  padding:11px 13px;outline:none;font-family:inherit;
  transition:border-color .2s;-webkit-appearance:none;margin-bottom:14px;
}
input:focus{border-color:var(--accent)}
button{
  width:100%;background:var(--accent);color:#fff;
  border:none;border-radius:var(--rs);padding:13px;
  font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:opacity .15s;
}
button:active{opacity:.85}
.err{
  background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);
  border-radius:var(--rs);padding:9px 12px;
  font-size:12px;color:var(--red);margin-bottom:14px;display:none;
}
.err.show{display:block}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <h1>🎮 Region Battle</h1>
    <p>Admin პანელი — შესვლა</p>
  </div>
  <form method="POST" action="/login" id="form">
    <input type="hidden" name="r" id="r-field"/>
    <div class="err" id="err">❌ არასწორი username ან პაროლი</div>
    <label>Username</label>
    <input type="text" name="username" placeholder="username" autocomplete="username" autofocus/>
    <label>პაროლი</label>
    <input type="password" name="password" placeholder="••••••" autocomplete="current-password"/>
    <button type="submit">შესვლა →</button>
  </form>
</div>
<script>
const p=new URLSearchParams(location.search);
if(p.get('error'))document.getElementById('err').classList.add('show');
document.getElementById('r-field').value=p.get('r')||'/admin';
</script>
</body>
</html>
